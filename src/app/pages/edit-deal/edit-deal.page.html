
<app-header [title]="'EDIT_DEAL.TITLE' | translate" [showBack]="true" defaultBackHref="/my-deals" />

<ion-content class="ph-page-content">
  <div class="form-container">

    @if (isLoading) {
      <div class="form-loading">{{ 'COMMON.LOADING' | translate }}</div>
    } @else if (hasError) {
      <div class="form-loading">{{ 'EDIT_DEAL.LOAD_ERROR' | translate }}</div>
    } @else {

      <div class="english-section-label">🇬🇧 {{ 'COMMON.ENGLISH_SECTION' | translate }}</div>

      <label class="field-label">{{ 'EDIT_DEAL.TITLE_LABEL' | translate }} *</label>
      <input class="ph-input" [(ngModel)]="title" />

      <label class="field-label">{{ 'EDIT_DEAL.DESC_LABEL' | translate }}</label>
      <textarea class="ph-textarea" [(ngModel)]="description" rows="3"></textarea>

      <div class="persian-section-label">🇮🇷 {{ 'COMMON.PERSIAN_SECTION' | translate }}</div>

      <label class="field-label">{{ 'EDIT_DEAL.TITLE_FA_LABEL' | translate }}</label>
      <input class="ph-input" dir="rtl" [(ngModel)]="titleFa" [placeholder]="'EDIT_DEAL.TITLE_FA_PLACEHOLDER' | translate" />

      <label class="field-label">{{ 'EDIT_DEAL.DESC_FA_LABEL' | translate }}</label>
      <textarea class="ph-textarea" dir="rtl" [(ngModel)]="descriptionFa" [placeholder]="'EDIT_DEAL.DESC_FA_PLACEHOLDER' | translate" rows="3"></textarea>

      <label class="field-label">{{ 'EDIT_DEAL.DISCOUNT_TYPE_LABEL' | translate }} *</label>
      <select class="ph-select" [(ngModel)]="discountType">
        <option value="Percentage">{{ 'CREATE_DEAL.PERCENTAGE' | translate }}</option>
        <option value="FixedAmount">{{ 'CREATE_DEAL.FIXED' | translate }}</option>
      </select>

      <label class="field-label">{{ 'EDIT_DEAL.DISCOUNT_VALUE_LABEL' | translate }} *</label>
      <input class="ph-input" type="number" [(ngModel)]="discountValue" min="0" />

      <label class="field-label">{{ 'EDIT_DEAL.COUPON_LABEL' | translate }}</label>
      <input class="ph-input" [(ngModel)]="couponCode" placeholder="e.g. SUMMER20" />

      <label class="field-label">{{ 'EDIT_DEAL.VALID_FROM_LABEL' | translate }}</label>
      <input class="ph-input" type="datetime-local" [(ngModel)]="validFrom" />

      <label class="field-label">{{ 'EDIT_DEAL.VALID_TO_LABEL' | translate }}</label>
      <input class="ph-input" type="datetime-local" [(ngModel)]="validTo" />

      <app-button
        class="submit-btn"
        [loading]="submitting"
        [disabled]="!title || !discountValue"
        (click)="submit()"
      >
        {{ 'COMMON.SAVE' | translate }}
      </app-button>
    }

  </div>
</ion-content>
