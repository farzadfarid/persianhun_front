<div class="login-container">
  <div class="auth-logo">
    <img src="assets/logo.png" width="200px" alt="PersianHub Logo" class="logo-image" />
  </div>

  <h1 class="ph-title">{{ 'AUTH.SIGN_IN' | translate }}</h1>
  <p class="ph-subtitle">{{ 'AUTH.WELCOME_BACK' | translate }}</p>

  <div class="auth-error" *ngIf="errorMessage">
    <ion-icon name="alert-circle-outline" class="error-icon" />
    <span>{{ errorMessage }}</span>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
    <app-input
      [label]="'AUTH.EMAIL_LABEL' | translate"
      type="email"
      [placeholder]="'AUTH.EMAIL_PLACEHOLDER' | translate"
      formControlName="email"
      [errorMessage]="emailError"
    />

    <app-input
      [label]="'AUTH.PASSWORD_LABEL' | translate"
      type="password"
      [placeholder]="'AUTH.PASSWORD_PLACEHOLDER' | translate"
      formControlName="password"
      [errorMessage]="passwordError"
    />

    <app-button type="submit" expand="block" [loading]="loading">
      {{ 'AUTH.SIGN_IN_BTN' | translate }}
    </app-button>
  </form>

  <p class="ph-caption auth-footer">
    {{ 'AUTH.NO_ACCOUNT' | translate }}
    <a routerLink="/auth/register" class="ph-accent-text">{{ 'AUTH.REGISTER_LINK' | translate }}</a>
  </p>
</div>
