<app-header [title]="'SUGGEST.TITLE' | translate" [showBack]="true" defaultBackHref="/profile" />

<ion-content class="ph-page-content">

  @if (submitted) {
    <div class="success-state">
      <p class="success-msg">{{ 'SUGGEST.SUCCESS' | translate }}</p>
    </div>
  } @else {
    <p class="page-desc ph-caption">{{ 'SUGGEST.DESCRIPTION' | translate }}</p>

    <div class="form-card">
      <label class="field-label">{{ 'SUGGEST.NAME_LABEL' | translate }}</label>
      <input class="ph-input" [(ngModel)]="businessName" [placeholder]="'SUGGEST.NAME_PLACEHOLDER' | translate" />

      <label class="field-label">{{ 'SUGGEST.CATEGORY_LABEL' | translate }}</label>
      <input class="ph-input" [(ngModel)]="categoryText" [placeholder]="'SUGGEST.CATEGORY_PLACEHOLDER' | translate" />

      <label class="field-label">{{ 'SUGGEST.PHONE_LABEL' | translate }}</label>
      <input class="ph-input" [(ngModel)]="phoneNumber" [placeholder]="'SUGGEST.PHONE_PLACEHOLDER' | translate" type="tel" />

      <label class="field-label">{{ 'SUGGEST.CITY_LABEL' | translate }}</label>
      <input class="ph-input" [(ngModel)]="city" [placeholder]="'SUGGEST.CITY_PLACEHOLDER' | translate" />

      <label class="field-label">{{ 'SUGGEST.DESC_LABEL' | translate }}</label>
      <textarea class="ph-textarea" [(ngModel)]="description" [placeholder]="'SUGGEST.DESC_PLACEHOLDER' | translate" rows="3"></textarea>

      @if (error) {
        <p class="error-msg">{{ error }}</p>
      }

      <div class="form-actions">
        <app-button [loading]="submitting" [disabled]="!businessName" (click)="submit()">
          {{ 'SUGGEST.SUBMIT' | translate }}
        </app-button>
      </div>
    </div>
  }

</ion-content>
